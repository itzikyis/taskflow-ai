version: "3.9"

# Lightweight compose override for running integration tests in CI
services:
  db_test:
    image: postgres:16-alpine
    container_name: taskflow_db_test
    environment:
      POSTGRES_DB: taskflow_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
