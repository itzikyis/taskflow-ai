version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: taskflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: taskflow_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=taskflow;Username=postgres;Password=postgres"
      Jwt__SecretKey: "TaskFlow_Dev_Secret_Key_Change_In_Production_32chars!"
      Jwt__Issuer: "taskflow-api"
      Jwt__Audience: "taskflow-client"
      Jwt__ExpiryMinutes: "60"
    ports:
      - "5000:8080"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: taskflow_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
